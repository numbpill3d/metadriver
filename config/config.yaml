# WiFi Logger Configuration

# Database settings
database:
  path: "/var/lib/wifi-logger/wifi_data.db"
  backup_dir: "/var/lib/wifi-logger/backups"
  backup_interval: 86400  # seconds (24 hours)
  auto_vacuum: true

# Capture settings
capture:
  interface: "wlan0mon"
  method: "kismet"  # kismet or scapy
  scan_channels: [1, 6, 11, 36, 40, 44, 48, 149, 153, 157, 161, 165]
  channel_dwell_time: 0.5  # seconds
  min_rssi: -90  # Minimum RSSI to log
  
  # Kismet specific
  kismet:
    log_dir: "/var/log/kismet"
    auto_start: true
    gps_device: "/dev/ttyUSB0"  # Set to null for no GPS

  # Scapy specific
  scapy:
    packet_count: 0  # 0 for unlimited
    filter: "type mgt subtype beacon or type mgt subtype probe-resp"

# GPS settings
gps:
  enabled: true
  device: "/dev/ttyUSB0"
  gpsd_host: "localhost"
  gpsd_port: 2947
  tracking_interval: 5  # seconds
  min_hdop: 5.0  # Maximum HDOP to accept

# Logging
logging:
  level: "INFO"
  file: "/var/log/wifi-logger/wifi.log"
  max_size: 10485760  # 10MB
  backup_count: 5

# Web interface
web:
  enabled: true
  host: "127.0.0.1"
  port: 8080
  debug: false
  api_key: ""  # Set for API access

# Auto-start
autostart:
  on_boot: true
  on_usb_insert: true
  as_service: true

# Data retention
retention:
  keep_observations_days: 90
  keep_networks_days: 365
  cleanup_interval: 86400  # seconds

# Export
export:
  geojson_path: "/var/lib/wifi-logger/exports"
  auto_export: false
  export_interval: 3600